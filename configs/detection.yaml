# ============================================================================
# Detection Pipeline — YOLO Training Configuration
# ============================================================================
# Trains YOLOv11/v26 models for tool segmentation and keypoint estimation.

# --- Segmentation ---
segmentation:
  model: "yolo11m-seg"         # Base model architecture
  epochs: 300
  imgsz: 640
  batch: 16
  lr0: 0.01
  lrf: 0.001
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  cos_lr: true
  augment: true
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.3
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5

# --- Keypoint / Pose ---
keypoints:
  model: "yolo11m-pose"        # Base model architecture
  epochs: 300
  imgsz: 640
  batch: 16
  lr0: 0.01
  lrf: 0.001
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  cos_lr: true
  augment: true
  mosaic: 1.0
  mixup: 0.1
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5

# --- Annotation ---
annotation:
  keypoints_per_tool: 8
  # Keypoint ordering: tip, ee_top, ee_bottom, mid_top, mid_bottom,
  #                    shaft_top, shaft_bottom, tail
  skeleton: [[0,1], [0,2], [1,3], [2,4], [3,5], [4,6], [5,7], [6,7]]
  categories:
    - id: 1
      name: "Tool"
